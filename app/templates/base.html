<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title or "FreshChef — AI Cooking Assistant" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/>
</head>
<body data-theme="light">

<!-- ========== NAV ========== -->
<nav class="nav">
  <a href="{{ url_for('main.landing') }}" class="nlogo">
    <div class="nmark">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M7 21c5.5 0 10-4.5 10-10 0-3.5 2-6 5-7-1 9-7 17-15 17-1.7 0-3-.4-4-.9 1.1.6 2.4.9 4 .9Z" fill="white"/>
        <path d="M6 14c1.6-5.4 6.7-7 10-7-4 2-6.6 5.6-7 10-1.8-.6-2.8-1.7-3-3Z" fill="white" opacity=".85"/>
      </svg>
    </div>
    FreshChef
  </a>

  <a class="ntab {% if request.endpoint == 'main.app_home' %}on{% endif %}" href="{{ url_for('main.app_home') }}">Cook</a>
  <a class="ntab {% if request.endpoint and 'recipe' in request.endpoint %}on{% endif %}" href="{{ url_for('recipes.recipes_page') }}">Recipes</a>
  <a class="ntab {% if request.endpoint == 'recipes.favorites_page' %}on{% endif %}" href="{{ url_for('recipes.favorites_page') }}">Favourites</a>

  <div class="thsw" id="themeSwitcher">
    <button class="thbtn on" data-theme="light" title="Light">☀️</button>
    <button class="thbtn"    data-theme="dark"  title="Dark">🌙</button>
    <button class="thbtn"    data-theme="hc"    title="High contrast">◑</button>
  </div>
</nav>

<!-- ========== MAIN ========== -->
<main>
  {% block content %}{% endblock %}
</main>

<!-- ========== TOAST CONTAINER ========== -->
<div id="toastContainer"></div>

<!-- ========== SCRIPTS ========== -->
<script>
  // ---- Theme switcher ----
  (function(){
    const saved = localStorage.getItem('fc-theme') || 'light';
    document.body.dataset.theme = saved;
    document.querySelectorAll('.thbtn').forEach(b => {
      b.classList.toggle('on', b.dataset.theme === saved);
    });
    document.querySelectorAll('.thbtn').forEach(b => {
      b.addEventListener('click', () => {
        const t = b.dataset.theme;
        document.body.dataset.theme = t;
        localStorage.setItem('fc-theme', t);
        document.querySelectorAll('.thbtn').forEach(x => x.classList.toggle('on', x.dataset.theme === t));
      });
    });
  })();

  // ---- Global toast ----
  function toast(msg, kind='info') {
    const el = document.createElement('div');
    el.className = 'toast' + (kind === 'success' ? ' success' : kind === 'error' ? ' error' : '');
    el.textContent = msg;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 2800);
  }

  // ---- Global apiJson ----
  async function apiJson(url, { method='GET', body, isForm=false } = {}) {
    const opts = { method, credentials: 'same-origin', headers: {} };
    if (body) {
      if (isForm) opts.body = body;
      else { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    }
    const res = await fetch(url, opts);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) { const err = new Error(data?.error || `request_failed_${res.status}`); err.data = data; throw err; }
    return data;
  }

  // ---- Chip builder ----
  function buildChip(text, onRemove) {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.innerHTML = `${text} <button type="button" aria-label="Remove ${text}">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
    </button>`;
    chip.querySelector('button').addEventListener('click', e => { e.stopPropagation(); onRemove(text); });
    return chip;
  }
</script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
