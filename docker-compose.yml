services:
  freshchef:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freshchef_app
    restart: unless-stopped

    ports:
      - "5051:5051"

    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_BASE_URL=${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - GROQ_VISION_MODEL=${GROQ_VISION_MODEL:-llama-4-scout-17b-16e-instruct}
      - GROQ_TIMEOUT_SECONDS=${GROQ_TIMEOUT_SECONDS:-60}
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - PORT=5051
      - DATABASE_URL=sqlite:////app/instance/freshchef.db
      - UPLOAD_FOLDER=/app/uploads
      - PEXELS_API_KEY=${PEXELS_API_KEY}

    volumes:
      - db_data:/app/instance
      - uploads_data:/app/uploads
      # models volume no longer needed — remove or keep if you want SD as fallback
      # - ./models:/app/models

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5051/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  db_data:
  uploads_data: